<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: A4;
            margin: 1.5cm;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #2563eb;
            font-size: 28px;
            margin-bottom: 10px;
            border-bottom: 3px solid #2563eb;
            padding-bottom: 10px;
        }
        h2 {
            color: #1e40af;
            font-size: 20px;
            margin-top: 25px;
            margin-bottom: 12px;
            border-left: 4px solid #2563eb;
            padding-left: 12px;
        }
        h3 {
            color: #374151;
            font-size: 16px;
            margin-top: 15px;
            margin-bottom: 8px;
        }
        p, li {
            font-size: 13px;
            margin: 6px 0;
        }
        ul {
            padding-left: 20px;
        }
        strong {
            color: #1f2937;
        }
        .contact-info {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 20px;
        }

    {{ content }}
